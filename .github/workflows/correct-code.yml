name: Inject new regions and flag-icons into HTML pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Inject regions, repair, and convert flags
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          // Canonical source of truth for every menu entry: code -> {iso, label, hreflang?}
          const langData = {
            en: { iso: "us", label: "English" },
            fr: { iso: "fr", label: "Français" },
            es: { iso: "es", label: "Español" },
            de: { iso: "de", label: "Deutsch" },
            it: { iso: "it", label: "Italiano" },
            pt: { iso: "pt", label: "Português" },
            ru: { iso: "ru", label: "Русский" },
            ja: { iso: "jp", label: "日本語" },
            ko: { iso: "kr", label: "한국어" },
            zh: { iso: "cn", label: "中文" },
            ar: { iso: "sa", label: "العربية" },
            hi: { iso: "in", label: "हिन्दी" },
            id: { iso: "id", label: "Indonesia" },
            tr: { iso: "tr", label: "Türkçe" },
            pl: { iso: "pl", label: "Polski" },
            nl: { iso: "nl", label: "Nederlands" },
            th: { iso: "th", label: "ไทย" },
            vi: { iso: "vn", label: "Tiếng Việt" },
            ms: { iso: "my", label: "Melayu" },
            kw: { iso: "kw", label: "Kuwait", hreflang: "ar-KW" },
            bh: { iso: "bh", label: "Bahrain", hreflang: "ar-BH" },
            om: { iso: "om", label: "Oman", hreflang: "ar-OM" },
            jo: { iso: "jo", label: "Jordan", hreflang: "ar-JO" },
            gb: { iso: "gb", label: "United Kingdom", hreflang: "en-GB" },
            eu: { iso: "eu", label: "Eurozone", hreflang: "en-150" },
            us: { iso: "us", label: "United States", hreflang: "en-US" },
            ae: { iso: "ae", label: "United Arab Emirates", hreflang: "ar-AE" },
            qa: { iso: "qa", label: "Qatar", hreflang: "ar-QA" },
            ca: { iso: "ca", label: "Canada", hreflang: "en-CA" },
            au: { iso: "au", label: "Australia", hreflang: "en-AU" },
            sg: { iso: "sg", label: "Singapore", hreflang: "en-SG" }
          };

          const regionCodes = Object.keys(langData).filter(c => langData[c].hreflang);

          function findFiles(dir, ext, out = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (entry.name.startsWith(".") || entry.name === "node_modules") continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) findFiles(full, ext, out);
              else if (entry.name.endsWith(ext)) out.push(full);
            }
            return out;
          }

          // ===== Step 1: repair any duplicated path segment in hrefs, wherever it occurs =====
          function fixHreflangDupes(html) {
            // Collapses any accidental repeat of the yt-ai/ segment, not just one hardcoded spot
            return html.replace(/(https:\/\/melamrahul\.github\.io\/yt-ai\/)(yt-ai\/)+/g, "$1");
          }

          // ===== Step 2: inject any missing region hreflang <link> tags, detected structurally =====
          // Instead of anchoring to the literal "ms" line, insert relative to the closing </head>,
          // right after the last existing hreflang alternate tag if one exists.
          function injectHead(html) {
            if (!html.includes("</head>")) return html;
            const missing = regionCodes.filter(
              code => !html.includes(`hreflang="${langData[code].hreflang}"`)
            );
            if (missing.length === 0) return html;

            const tags = missing
              .map(code => `\n<link rel="alternate" hreflang="${langData[code].hreflang}" href="https://melamrahul.github.io/yt-ai/${code}">`)
              .join("");

            // Find the last alternate-hreflang <link> tag in the document and insert after it.
            const linkRe = /<link rel="alternate" hreflang="[^"]*" href="[^"]*">/g;
            let lastMatch = null;
            let m;
            while ((m = linkRe.exec(html)) !== null) lastMatch = m;

            if (lastMatch) {
              const insertAt = lastMatch.index + lastMatch[0].length;
              return html.slice(0, insertAt) + tags + html.slice(insertAt);
            }
            // Fallback: no existing alternate tags found at all, insert before </head>
            return html.replace("</head>", tags + "\n</head>");
          }

          // ===== Step 3: add flag-icons CDN if missing =====
          const CDN_LINK = '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css">';
          function injectCdn(html) {
            if (html.includes("flag-icons")) return html;
            if (!html.includes("</head>")) return html;
            return html.replace("</head>", CDN_LINK + "\n</head>");
          }

          // ===== Step 4: ensure every language <li> exists and is in canonical form =====
          // Rebuilds by data-code lookup instead of parsing emoji/flag text — immune to corruption bugs.
          // Also INSERTS any <li> that's missing entirely, not just fixes malformed ones.
          function normalizeAndFillMenuLis(html) {
            const ulRe = /(<ul class="lang-menu"[^>]*>)([\s\S]*?)(<\/ul>)/;
            const match = html.match(ulRe);
            if (!match) return html; // no lang menu on this page at all

            const [, openTag, innerOriginal, closeTag] = match;
            let inner = innerOriginal;

            for (const [code, d] of Object.entries(langData)) {
              const liRe = new RegExp(`<li data-code="${code}"[^>]*>[\\s\\S]*?</li>`);
              const canonical = `<li data-code="${code}" data-flagclass="fi-${d.iso}" data-href="/yt-ai/${code}"><span class="fi fi-${d.iso}"></span> ${d.label}</li>`;
              if (liRe.test(inner)) {
                inner = inner.replace(liRe, canonical);
              } else {
                // Missing entirely (e.g. brand-new region not yet added to this page) — append it.
                inner = inner + canonical;
              }
            }

            return html.slice(0, match.index) + openTag + inner + closeTag + html.slice(match.index + match[0].length);
          }

          // Determine this page's own language code from <html lang="xx">, and use THAT
          // language's flag for the top button — instead of hardcoding fi-us on every page.
          function updateLangButtonMarkup(html) {
            const htmlLangMatch = html.match(/<html[^>]*\blang="([a-zA-Z-]+)"/);
            const pageCode = htmlLangMatch ? htmlLangMatch[1].toLowerCase().split("-")[0] : "en";
            const d = langData[pageCode] || langData.en; // fallback if code not recognized
            return html.replace(
              /<span id="langFlag">[\s\S]*?<\/span>(<\/span>)?/,
              `<span id="langFlag"><span class="fi fi-${d.iso}"></span></span>`
            );
          }

          let changedHtml = 0;
          for (const file of findFiles(".", ".html")) {
            const original = fs.readFileSync(file, "utf8");
            let updated = fixHreflangDupes(original);
            updated = injectHead(updated);
            updated = normalizeAndFillMenuLis(updated);
            updated = injectCdn(updated);
            updated = updateLangButtonMarkup(updated);
            if (updated !== original) {
              fs.writeFileSync(file, updated, "utf8");
              changedHtml++;
              console.log("Updated HTML:", file);
            }
          }

          const CSS_RULE = "\n.fi{border-radius:2px;margin-right:6px;vertical-align:middle}";
          let changedCss = 0;
          for (const file of findFiles(".", ".css")) {
            const original = fs.readFileSync(file, "utf8");
            if (original.includes(".fi{") || original.includes(".fi {")) continue;
            fs.writeFileSync(file, original + CSS_RULE, "utf8");
            changedCss++;
            console.log("Updated CSS:", file);
          }

          const NEW_LANG_JS = `document.addEventListener("DOMContentLoaded",function(){const sel=document.getElementById("langSelector"),btn=document.getElementById("langBtn"),menu=document.getElementById("langMenu"),flag=document.getElementById("langFlag"),code=document.getElementById("langCode");btn.addEventListener("click",function(e){e.stopPropagation();sel.classList.toggle("open");btn.setAttribute("aria-expanded",sel.classList.contains("open"))});menu.querySelectorAll("li").forEach(function(li){li.addEventListener("click",function(){const fiSpan=li.querySelector(".fi");flag.innerHTML=fiSpan?fiSpan.outerHTML:"";code.textContent=li.dataset.code.toUpperCase();sel.classList.remove("open");window.location.href=li.dataset.href})});document.addEventListener("click",function(e){if(!sel.contains(e.target))sel.classList.remove("open")})});`;

          let changedJs = 0;
          for (const file of findFiles(".", ".js")) {
            if (!file.includes("lang")) continue;
            const original = fs.readFileSync(file, "utf8");
            if (original.trim() === NEW_LANG_JS.trim()) continue;
            fs.writeFileSync(file, NEW_LANG_JS, "utf8");
            changedJs++;
            console.log("Updated JS:", file);
          }

          console.log(`Done. ${changedHtml} HTML, ${changedCss} CSS, ${changedJs} JS file(s) modified.`);
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: repair broken hreflang/menu entries and normalize flag-icons across all pages"
          git push
